<script>
(function () {
  const countEl = document.getElementById("onlineCount");
  const textEl  = document.getElementById("onlineText");

  const hour = new Date().getHours();
  let min, max;

  // ===== XÁC ĐỊNH GIỜ CAO ĐIỂM =====
  if (hour >= 20 || hour < 10) {
    // 🔥 Cao điểm tối + sáng
    min = 6; max = 10;
  } else if (hour >= 11 && hour < 14) {
    // 🔥 Cao điểm trưa
    min = 5; max = 8;
  } else {
    // 🌤️ Giờ thường
    min = 2; max = 4;
  }

  let count = Math.floor(Math.random() * (max - min + 1)) + min;
  countEl.textContent = count;

  // ===== CÂU CHỮ LUÂN PHIÊN =====
  const texts = ["đang xem", "đang chọn mô hình"];
  let textIndex = 0;

  setInterval(() => {
    textIndex = (textIndex + 1) % texts.length;
    textEl.textContent = texts[textIndex];
  }, 7000);

  // ===== DAO ĐỘNG NHẸ SỐ KHÁCH =====
  setInterval(() => {
    let change = Math.random() > 0.6 ? 1 : -1;
    count += change;
    if (count < min) count = min;
    if (count > max) count = max;
    countEl.textContent = count;
  }, 8000);

  // ===== 🔥 TICK SẢN PHẨM → +1 =====
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", () => {
      if (cb.checked) {
        count++;
        textEl.textContent = "đang chọn mô hình";
      } else {
        count--;
        textEl.textContent = "đang xem";
      }

      if (count < min) count = min;
      if (count > max + 2) count = max + 2;

      countEl.textContent = count;
    });
  });
})();
function showImage(imgUrl) {
  const modal = document.getElementById("imageModal");
  const img   = document.getElementById("modalImg");
  img.src = imgUrl;
  modal.style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}
</script>

<div id="imageModal" class="closeable" onclick="closeImage()">
